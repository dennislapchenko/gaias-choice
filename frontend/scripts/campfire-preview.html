<!doctype html>
<!--
  Standalone preview harness for the /account page (src/pages/Account.tsx +
  src/components/AccountFields.tsx). That page only renders its content once
  `me` is set, which needs a real signed-in session against the backend — this
  lets you iterate on the campfire scene, the right-rail/mobile-toggle
  account-fields panel, and every content/themes.yaml palette instantly.
  Resize the window (or use devtools' device toolbar) past 900px to check
  both the desktop right-rail and the mobile title-line toggle.

  Serve from the REPO ROOT (paths below are root-relative) and open this file:
    cd gaias-choice && python3 -m http.server 4175
    open http://localhost:4175/scripts/campfire-preview.html

  The Campfire SVG markup, the toggle's pencil icon, and the account-fields
  form markup are copied from those files (JSX, not importable into plain
  HTML/JS) — if you change them there, update them here too so this stays a
  faithful preview.
-->
<html data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Campfire scene preview</title>
<link rel="stylesheet" href="/src/styles.css" />
<style>
  body { padding: 24px; }
  .palette-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; font-family: sans-serif; }
  .palette-picker button { padding: 6px 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--white); cursor: pointer; }
  .palette-picker button.is-active { background: var(--sage); color: var(--on-accent); }
</style>
</head>
<body>
<div class="palette-picker" id="palettes"></div>
<section class="account-page">
  <div class="account-header">
    <h1>Around the campfire</h1>
    <button type="button" class="user-toggle account-fields-toggle" id="fields-toggle" aria-expanded="false" aria-label="Your details">
      <svg class="user-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 16.7V20h3.3L18 9.3a1 1 0 0 0 0-1.4l-1.9-1.9a1 1 0 0 0-1.4 0L4 16.7z"/>
        <path d="M13.8 6.9l3.3 3.3"/>
      </svg>
    </button>
  </div>
  <p class="muted">Everyone who has joined the site so far — one circle, one fire.</p>
  <div class="reviews-layout">
    <div class="reviews-main">
      <div class="campfire-scene" role="list" id="scene"></div>
    </div>
    <section class="account-fields" id="fields-panel" aria-label="Your details">
      <p class="side-label">Your details</p>
      <form id="fields-form">
        <label class="field"><span class="field-label">Name</span><input id="f-name" value="Denis"></label>
        <label class="field"><span class="field-label">Avatar</span><input id="f-avatar" type="url" placeholder="Image URL"></label>
        <label class="field"><span class="field-label">Role</span><input value="admin" disabled></label>
        <label class="field"><span class="field-label">Email</span><input id="f-email" type="email" value="denis@example.com"></label>
        <label class="field"><span class="field-label">Password</span><input id="f-password" type="password" placeholder="Leave blank to keep current"></label>
        <button type="submit" class="btn btn-primary" id="save-btn" style="display:none">Save</button>
      </form>
    </section>
  </div>
</section>
<script>
// Copied from content/themes.yaml — keep in sync if a palette changes.
const PALETTES = {
  meadow:     { sage: '#6f8f6a', sageDark: '#52704f', onAccent: '#16231a', clay: '#c67b4a', sand: '#faf5ee', sand2: '#efe9df', line: '#e6ddcf', mint: '#d5ecda', peach: '#fbdccb', lilac: '#e7ddf7' },
  bubblegum:  { sage: '#c85088', sageDark: '#a23c6c', onAccent: '#ffffff', clay: '#cf5f92', sand: '#fff6fb', sand2: '#f6e6ef', line: '#f0d9e6', mint: '#ffd9e8', peach: '#e6dcff', lilac: '#d6eefb' },
  citrus:     { sage: '#bf6a2e', sageDark: '#9c521f', onAccent: '#ffffff', clay: '#cf8a2f', sand: '#fffaf0', sand2: '#f5ecd8', line: '#eee0c4', mint: '#fdf0c4', peach: '#ffe0c2', lilac: '#dcefc7' },
  periwinkle: { sage: '#7c6cc4', sageDark: '#5f4fa8', onAccent: '#ffffff', clay: '#8f6fc7', sand: '#f7f5ff', sand2: '#ebe7fb', line: '#e2dcf7', mint: '#e0dcfb', peach: '#dbe7fb', lilac: '#f0dcf7' },
  lagoon:     { sage: '#1f9e96', sageDark: '#157a73', onAccent: '#041d1a', clay: '#2aa39a', sand: '#f0fbfa', sand2: '#ddf0ee', line: '#cbe9e5', mint: '#c7ede8', peach: '#d9eec2', lilac: '#cfe6f7' },
  sunset:     { sage: '#e0654e', sageDark: '#bd4b37', onAccent: '#3a140c', clay: '#e07a3c', sand: '#fff6f0', sand2: '#f7e7dc', line: '#f0dccc', mint: '#ffe0cf', peach: '#ffd6d0', lilac: '#ffe9c2' },
  grape:      { sage: '#9b4bc4', sageDark: '#7d37a2', onAccent: '#ffffff', clay: '#b45fb0', sand: '#faf4fc', sand2: '#efe2f4', line: '#e6d5ee', mint: '#e9d6f5', peach: '#f6d3ea', lilac: '#d9d5f5' },
}
const VAR_MAP = { sage: '--sage', sageDark: '--sage-dark', onAccent: '--on-accent', clay: '--clay', sand: '--sand', sand2: '--sand-2', line: '--line', mint: '--mint', peach: '--peach', lilac: '--lilac' }
function applyPalette(tag) {
  const colors = PALETTES[tag]
  for (const [key, cssVar] of Object.entries(VAR_MAP)) document.documentElement.style.setProperty(cssVar, colors[key])
  document.body.style.background = colors.sand
  ;[...document.querySelectorAll('.palette-picker button')].forEach((b) => b.classList.toggle('is-active', b.dataset.tag === tag))
}
const picker = document.getElementById('palettes')
Object.keys(PALETTES).forEach((tag) => {
  const btn = document.createElement('button')
  btn.textContent = tag
  btn.dataset.tag = tag
  btn.onclick = () => applyPalette(tag)
  picker.appendChild(btn)
})
applyPalette('periwinkle')

// ---- Copied from src/pages/Account.tsx (Campfire) ----
const CAMPFIRE = `<svg class="campfire" viewBox="0 0 120 120">
  <ellipse cx="60" cy="102" rx="36" ry="9" fill="var(--sand-2)"/>
  <rect x="30" y="88" width="60" height="9" rx="4.5" fill="#8a6248" transform="rotate(12 60 92)"/>
  <rect x="30" y="88" width="60" height="9" rx="4.5" fill="#75533d" transform="rotate(-12 60 92)"/>
  <g class="campfire-flames">
    <path d="M60 22 C46 44 40 58 40 70 a20 20 0 0 0 40 0 C80 58 74 44 60 22 Z" fill="var(--clay)"/>
    <path d="M60 38 C51 53 47 62 47 71 a13 13 0 0 0 26 0 C73 62 69 53 60 38 Z" fill="#f6a04d"/>
    <path d="M60 54 C55 62 53 67 53 72 a7 7 0 0 0 14 0 C67 67 65 62 60 54 Z" fill="#ffd27a"/>
  </g>
</svg>`
// A self-contained test "photo" (no network dependency) with visible
// off-center detail, so cropping/zoom bugs in .avatar-img are obvious.
const TEST_AVATAR =
  "data:image/svg+xml;utf8," +
  encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
      <rect width="200" height="200" fill="#e0654e"/>
      <rect width="100" height="100" fill="#ffd27a"/>
      <rect x="100" y="100" width="100" height="100" fill="#1f9e96"/>
      <circle cx="100" cy="100" r="30" fill="white"/>
      <text x="100" y="106" font-size="16" text-anchor="middle" fill="#333">FACE</text>
    </svg>`,
  )

const scene = document.getElementById('scene')
scene.innerHTML += CAMPFIRE
const members = ['Anna', 'Denis', 'Lidia', 'Max', 'Sofia', 'Ivan', 'Kate']
members.forEach((name, i) => {
  const angle = (i / members.length) * 2 * Math.PI - Math.PI / 2
  const left = 50 + 41 * Math.cos(angle)
  const top = 50 + 41 * Math.sin(angle)
  // Denis previews the avatar-image crop; everyone else keeps the initial letter.
  const avatar =
    name === 'Denis'
      ? `<img class="avatar-img" src="${TEST_AVATAR}" alt="" />`
      : name[0]
  scene.innerHTML += `<div class="camper" style="left:${left}%;top:${top}%"><span class="camper-avatar">${avatar}</span><span class="camper-name">${name}</span></div>`
})

// ---- mobile toggle, mirrors Account.tsx's fieldsOpen state (CSS does the
// showing/hiding via .is-open — see .account-fields in styles.css) ----
const fieldsToggle = document.getElementById('fields-toggle')
const fieldsPanel = document.getElementById('fields-panel')
fieldsToggle.addEventListener('click', () => {
  const open = !fieldsPanel.classList.contains('is-open')
  fieldsPanel.classList.toggle('is-open', open)
  fieldsToggle.setAttribute('aria-expanded', String(open))
  fieldsToggle.classList.toggle('is-open', open)
})

// ---- account-fields dirty-tracking, mirrors AccountFields.tsx ----
const baseline = { name: 'Denis', email: 'denis@example.com', avatar: '' }
const fName = document.getElementById('f-name')
const fAvatar = document.getElementById('f-avatar')
const fEmail = document.getElementById('f-email')
const fPassword = document.getElementById('f-password')
const saveBtn = document.getElementById('save-btn')
function refreshDirty() {
  const dirty =
    fName.value !== baseline.name ||
    fAvatar.value !== baseline.avatar ||
    fEmail.value !== baseline.email ||
    fPassword.value !== ''
  saveBtn.style.display = dirty ? '' : 'none'
}
;[fName, fAvatar, fEmail, fPassword].forEach((el) => el.addEventListener('input', refreshDirty))
document.getElementById('fields-form').addEventListener('submit', (e) => {
  e.preventDefault()
  baseline.name = fName.value
  baseline.avatar = fAvatar.value
  baseline.email = fEmail.value
  fPassword.value = ''
  refreshDirty()
})
</script>
</body>
</html>
