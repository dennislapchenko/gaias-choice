# Task runner for Gaia's Choice. https://taskfile.dev
#
# All npm work runs inside a throwaway node:alpine container, and node_modules
# lives in a named Docker volume — nothing touches your host filesystem. This
# mirrors the supply-chain stance in .npmrc / README.
#
# Run `task` (no args) to list everything.
version: '3'

vars:
  NODE_IMAGE: node:22-alpine
  IMAGE: gaias-choice
  PORT: '8080' # Cloud Run runtime port (nginx)
  DEV_PORT: '5173' # Vite dev server
  REGION: europe-west1
  SERVICE: gaias-choice
  VOLUME: gaias-choice-node-modules
  # Backend (Go) settings — same containerized-toolchain stance as the FE.
  GO_IMAGE: golang:1.25-alpine
  BE_PORT: '8787'
  BE_IMAGE: gaias-choice-be
  GO_VOLUME: gaias-choice-go-cache
  # Reusable "npm in a container" prefix: source mounted read-write, deps in a volume.
  NODE_RUN: >-
    docker run --rm -v {{.ROOT_DIR}}:/app -w /app
    -v {{.VOLUME}}:/app/node_modules {{.NODE_IMAGE}}
  # Reusable "go in a container" prefix: repo mounted, workdir backend/, module
  # + build cache in a named volume (mirrors NODE_RUN). -buildvcs=false because
  # the container workdir isn't the git root.
  GO_RUN: >-
    docker run --rm -v {{.ROOT_DIR}}:/app -w /app/backend
    -v {{.GO_VOLUME}}:/go -e GOFLAGS=-buildvcs=false {{.GO_IMAGE}}

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  deps:
    desc: Install dependencies into the isolated volume (skipped when lockfile is unchanged)
    internal: true
    sources:
      - package.json
      - package-lock.json
    generates:
      - .task/deps.done
    cmds:
      - '{{.NODE_RUN}} npm ci --ignore-scripts --no-fund'
      - mkdir -p .task && touch .task/deps.done

  dev:
    desc: Run FE (Vite HMR :5173) and BE (air hot reload :8787) together
    deps: [deps]
    cmds:
      # compose.dev.yaml uses the deps volume (from `deps` above) and the Go
      # cache volume as external — create the Go one if it doesn't exist yet.
      - docker volume create {{.GO_VOLUME}} >/dev/null
      - docker compose -f compose.dev.yaml up

  be:dev:
    desc: Run the backend from source on :8787 (BE-only; combined FE+BE dev is `task dev`)
    cmds:
      - >-
        docker run --rm -it -v {{.ROOT_DIR}}:/app -w /app/backend
        -v {{.GO_VOLUME}}:/go -e GOFLAGS=-buildvcs=false
        -p {{.BE_PORT}}:{{.BE_PORT}} {{.GO_IMAGE}} go run .

  be:test:
    desc: Vet and test the backend in a container
    cmds:
      - '{{.GO_RUN}} sh -c "go vet ./... && go test ./..."'

  be:tidy:
    desc: Sync go.mod/go.sum and verify the module cache (containerized)
    cmds:
      - '{{.GO_RUN}} sh -c "go mod tidy && go mod verify"'

  be:gen:
    desc: Regenerate the OpenAPI server code (backend/internal/httpapi/gen.go) from openapi.yaml
    cmds:
      # Pinned + run-not-imported (like air); only the generated file's small
      # runtime helper package lives in go.mod.
      - '{{.GO_RUN}} go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.7.2 -config oapi-codegen.yaml openapi.yaml'

  be:image:
    desc: Build the production backend Docker image (distroless)
    cmds:
      - docker build -t {{.BE_IMAGE}} backend/

  be:run:
    desc: Build and run the prod backend image locally on :8787 with a data volume
    deps: [be:image]
    cmds:
      - >-
        docker run --rm -p {{.BE_PORT}}:{{.BE_PORT}}
        -v {{.BE_IMAGE}}-data:/data {{.BE_IMAGE}}

  be:tunnel:
    desc: Expose the local backend over ngrok (host tool, as with FE dev)
    cmds:
      - ngrok http {{.BE_PORT}}

  be:verify:
    desc: Backend gate — spec-code sync + vet + test + production image build
    cmds:
      # Contract drift gate: regenerating must be a no-op, or someone edited
      # gen.go by hand / changed the spec without running be:gen.
      - task: be:gen
      - git diff --exit-code -- backend/internal/httpapi/gen.go
      - task: be:test
      - task: be:image

  be:deploy:
    desc: >-
      Ship the latest CI-built backend image to the VM (owner-invoked, manual;
      temporary until doco-cd). Resolves the image sha from GitHub Actions,
      assembles deploy.env from the local .env + VM vars, scps
      compose/Caddyfile/env, then pulls + recreates. Override: BE_TAG=sha-… to
      pin an image; VM_SSH=… VM_KEY=… VM_DIR=… for a different host.
    vars:
      VM_SSH: '{{.VM_SSH | default "root@gaias-choice.gardenofatlantis.com"}}'
      VM_KEY: '{{.VM_KEY | default "~/.ssh/gaia"}}'
      VM_DIR: '{{.VM_DIR | default "/opt/gaias-choice/deploy"}}'
      API_DOMAIN: '{{.API_DOMAIN | default "gaias-choice.gardenofatlantis.com"}}'
      CORS_ORIGINS: '{{.CORS_ORIGINS | default "https://dennislapchenko.github.io"}}'
    cmds:
      - >-
        VM_SSH='{{.VM_SSH}}' VM_KEY='{{.VM_KEY}}' VM_DIR='{{.VM_DIR}}'
        API_DOMAIN='{{.API_DOMAIN}}' CORS_ORIGINS='{{.CORS_ORIGINS}}'
        BE_TAG='{{.BE_TAG}}' bash deploy/release.sh

  typecheck:
    desc: Strict TypeScript type-check
    deps: [deps]
    cmds:
      - '{{.NODE_RUN}} npm run typecheck'

  build:
    desc: Build the SPA to dist/
    deps: [deps]
    cmds:
      - '{{.NODE_RUN}} npm run build'

  lock:
    desc: Regenerate package-lock.json (isolated, no scripts run)
    cmds:
      - >-
        docker run --rm -v {{.ROOT_DIR}}:/app -w /app {{.NODE_IMAGE}}
        npm install --package-lock-only --ignore-scripts --no-fund

  audit:
    desc: Audit dependencies for known vulnerabilities
    cmds:
      - >-
        docker run --rm -v {{.ROOT_DIR}}:/app -w /app {{.NODE_IMAGE}}
        npm audit --audit-level=low

  images:
    desc: Optimize public/images to resized WebP (PNG/JPG in, WebP out, originals removed)
    vars:
      MAGICK: dpokidov/imagemagick:latest
      MAX_DIM: '1400' # shrink-only: images smaller than this are left as-is
      QUALITY: '80'
    cmds:
      - >-
        docker run --rm --entrypoint sh -v {{.ROOT_DIR}}/public/images:/imgs -w /imgs {{.MAGICK}}
        -c 'for f in *.png *.jpg *.jpeg; do [ -e "$f" ] || continue;
        magick "$f" -resize "{{.MAX_DIM}}x{{.MAX_DIM}}>" -quality {{.QUALITY}}
        -define webp:method=6 "${f%.*}.webp" && rm "$f"; done'
      - 'echo "Remember to reference the .webp files in content/ frontmatter."'

  mandalas:
    desc: 'Generate mandala SVG art for a config set (SET=guides|reviews, optional ONLY=slug1,slug2)'
    vars:
      SET: '{{.SET | default "reviews"}}'
    cmds:
      - '{{.NODE_RUN}} node scripts/generate-mandala.mjs {{.SET}} {{if .ONLY}}--only={{.ONLY}}{{end}}'

  image:
    desc: Build the production Docker image (nginx)
    cmds:
      - docker build -t {{.IMAGE}} .

  run:
    desc: Build the image and run it locally (http://localhost:8080)
    deps: [image]
    cmds:
      - docker run --rm -p {{.PORT}}:{{.PORT}} {{.IMAGE}}

  deploy:
    desc: Deploy to Google Cloud Run from source (override with REGION=... SERVICE=...)
    cmds:
      - >-
        gcloud run deploy {{.SERVICE}} --source . --region {{.REGION}}
        --allow-unauthenticated --port {{.PORT}}

  verify:
    desc: Full local check — audit, typecheck, and a production image build
    cmds:
      - task: audit
      - task: typecheck
      - task: image

  clean:
    desc: Remove build output, deps volume, task cache, and the local image
    cmds:
      - rm -rf dist .task
      - docker volume rm {{.VOLUME}} 2>/dev/null || true
      - docker volume rm {{.GO_VOLUME}} 2>/dev/null || true
      - docker image rm {{.IMAGE}} 2>/dev/null || true
      - docker image rm {{.BE_IMAGE}} 2>/dev/null || true
