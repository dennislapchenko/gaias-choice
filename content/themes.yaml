# Color palettes. Each has a `tag` (stable id, shown in the switcher and used to
# persist the choice) and an optional `default: true` to make it the one used
# when a visitor has no saved preference. To make a palette permanent as the
# default, set default: true here (and false/remove it on the others).
#
# `sage` is the primary accent; `mint`/`peach`/`lilac` are three pastel slots.
#
# Dark palettes additionally set `ink` (text), `muted` (secondary text) and
# `white` (card/raised surface) to flip those dark; light palettes omit them and
# inherit the light :root defaults. `defaultDark: true` marks the palette used
# when a first-time visitor's OS is in dark mode (light `default:` is used when
# it's light); an explicit pick in the switcher persists over both.
# ponytail: colors are eyeballed for contrast — tune the dark values to taste.

- tag: meadow
  label: Meadow
  colors:
    sage: "#6f8f6a"
    sageDark: "#52704f"
    onAccent: "#16231a"
    clay: "#c67b4a"
    sand: "#faf5ee"
    sand2: "#efe9df"
    line: "#e6ddcf"
    mint: "#d5ecda"
    peach: "#fbdccb"
    lilac: "#e7ddf7"

