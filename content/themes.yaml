# --- Dark palettes -----------------------------------------------------------

# Backgrounds are deep but COLOURED (jewel tones, not near-black), accents are
# bright and a little unexpected — a warm pop against a cool ground and vice
# versa. ponytail: eyeballed for contrast; nudge if a pairing feels off.

- tag: midnight
  label: Midnight
  defaultDark: true
  colors:
    sage: "#9d8bff" # electric violet
    sageDark: "#bcb0ff"
    onAccent: "#141130"
