# Color palettes. Each has a `tag` (stable id, shown in the switcher and used to
# persist the choice) and an optional `default: true` to make it the one used
# when a visitor has no saved preference. To make a palette permanent as the
# default, set default: true here (and false/remove it on the others).
#
# `sage` is the primary accent; `mint`/`peach`/`lilac` are three pastel slots.

- tag: meadow
  colors:
    sage: "#6f8f6a"
    sageDark: "#52704f"
    onAccent: "#16231a"
    clay: "#c67b4a"
    sand: "#faf5ee"
    sand2: "#efe9df"
    line: "#e6ddcf"
    mint: "#d5ecda"
    peach: "#fbdccb"
    lilac: "#e7ddf7"

- tag: bubblegum
