# Themed Compass collections shown as thumbnails at the top of /compass. A
# chapter belongs to the epic whose `tag` equals its FIRST tag. The first epic
# here is the default selection. Add an epic + tag chapters with it to grow this.
epics:
  - tag: founder-guide
    title: Честный сайт с нуля
    image: /images/epic-founder-guide.svg
    blurb: Kурс из 5 глав — о том, как построить сайт-обзорник и блог с курсами, которому верят, — на живом примере этого самого сайта, от первого обзора до запуска. Каждый шаг настоящий, включая те, что дались тяжело.
  - tag: homeopathy
    title: Гомеопатия
    image: /images/epic-homeopathy.svg
    blurb: Курс из 11 глав — собрать домашнюю аптечку и научиться работать с ней честно, наблюдая и записывая, не подменяя врача категорически.
  - tag: herbalism
    title: Травничество
    image: /images/epic-herbalism.svg
    blurb: Курс из 11 глав — вырастить зелёную полку настоев, масел и настоек и узнать десять растений так, как знают людей.
  - tag: trophology
    title: Трофология
    image: /images/epic-trophology.svg
    blurb: Курс из 5 глав — о сочетании продуктов — собрать карту на холодильник и дневник пищеварения и проверить, от каких привычек за столом вам правда легче, — судя по своему телу, а не по догме.

