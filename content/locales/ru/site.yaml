name: Gaia's Choice
tagline: Натуральное снаряжение для жизни в дороге с малышом
description: >-
  Честные обзоры из реального опыта — натуральные товары без пластика и отдушек
  для путешествий с малышом на кемпере, машине или с ручной кладью. Мы
  обозреваем только то, чем сами владеем и пользуемся — без синтетики,
  без парфюма, без догадок. Если мы это не проверили руками — этого здесь нет.
bio: >-
  Два года мы своими руками строили кемпер с нуля — теперь живём в нём в дороге
  с малышом и двумя басенджи.
mission: >-
  Мы помогаем семьям путешествовать осознанно, комфортно и безопасно — используя
  только натуральное, экологичное снаряжение без синтетики, отдушек и пластика.
  Не потому что так модно, а потому что вещь рядом с малышом должна быть честной.

# Текущий продакшн-адрес — сейчас это подпуть GitHub Pages, позже переедет на
# корень собственного домена (см. комментарий в en/site.yaml).
url: https://dennislapchenko.github.io/gaias-choice

heroImage: /images/hero.webp

values:
  - title: Честность прежде всего
    icon: honesty
    text: Каждый обзор — о снаряжении, которое мы действительно упаковали, использовали и с которым жили в дороге. Ничего из головы.
  - title: Безопасно и натурально
    icon: natural
    text: Мы ищем органические, нетоксичные материалы — те, которым доверишь место рядом с новорождённым, без «но там наверное всё в порядке».
  - title: Меньше, но лучше
    icon: less
    text: В кемпере — да и в ручной клади — нет места для лишнего. Мы выбираем прочные, многофункциональные вещи и не путаем это с экономией.
  - title: Осознанность по умолчанию
    icon: mindful
    text: Меньше вещей, но лучше — это меньше отходов, более лёгкая дорога и меньший след. Осознанность — не лозунг, а то, что реально проверяется в поездке.

# Left-rail widgets, in render order. Each `type` maps to a collapsible panel in
# src/components/Sidebar.tsx (about | missionValues | almanac). Reorder, drop, or
# repeat entries here; adding a brand-new type needs a component in that file.
sidebar:
  - type: about
  - type: missionValues
  - type: almanac

# Themed guide collections shown as thumbnails at the top of /guides. A guide
# belongs to the epic whose `tag` equals the guide's FIRST tag. The first epic
# here is the default selection. Add an epic + tag guides with it to grow this.
epics:
  - tag: founder-guide
    title: Честный сайт с нуля
    image: /images/guide-eco-items.webp
    blurb: Бесплатный курс из пяти глав о том, как построить сайт-обзорник, которому верят, — на живом примере этого самого сайта, от первого обзора до запуска. Каждый шаг настоящий, включая те, что дались тяжело.
  - tag: homeopathy
    title: Гомеопатия дома
    image: /images/guide-natural-vs.webp
    blurb: Курс из 11 глав — собрать домашнюю аптечку и научиться работать с ней честно, наблюдая и записывая, не подменяя врача.
  - tag: herbalism
    title: Домашний травник
    image: /images/beeswax.webp
    blurb: Курс из 11 глав — вырастить зелёную полку настоев, масел и настоек и узнать десять растений так, как знают людей.

nav:
