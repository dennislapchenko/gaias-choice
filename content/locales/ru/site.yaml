name: Gaia's Choice
tagline: Натуральное снаряжение для жизни в дороге с малышом
description: >-
  Честные обзоры из реального опыта — натуральные товары без пластика и отдушек
  для путешествий с малышом на кемпере, машине или с ручной кладью. Мы
  обозреваем только то снаряжение, которым владеем и пользуемся — без синтетики,
  без парфюма, без догадок.
mission: >-
  Мы помогаем семьям путешествовать осознанно, комфортно и безопасно — используя
  только натуральное, экологичное снаряжение без синтетики, отдушек и пластика.

heroImage: /images/hero.webp

values:
  - title: Честность прежде всего
    icon: honesty
    text: Каждый обзор — о снаряжении, которое мы действительно упаковали, использовали и с которым жили в дороге.
  - title: Безопасно и натурально
    icon: natural
    text: Мы ищем органические, нетоксичные материалы — те, которым доверишь место рядом с новорождённым.
  - title: Меньше, но лучше
    icon: less
    text: В кемпере — да и в ручной клади — нет места для лишнего. Мы выбираем прочные, многофункциональные вещи.
  - title: Осознанность по умолчанию
    icon: mindful
    text: Меньше вещей, но лучше — это меньше отходов, более лёгкая дорога и меньший след.

# Left-rail widgets, in render order. Each `type` maps to a collapsible panel in
# src/components/Sidebar.tsx (about | missionValues | almanac). Reorder, drop, or
# repeat entries here; adding a brand-new type needs a component in that file.
sidebar:
  - type: about
  - type: missionValues
  - type: almanac

# Themed guide collections shown as thumbnails at the top of /guides. A guide
# belongs to the epic whose `tag` equals the guide's FIRST tag. The first epic
# here is the default selection. Add an epic + tag guides with it to grow this.
epics:
  - tag: founder-guide
    title: Строим публично
    image: /images/guide-eco-items.webp
    blurb: Бесплатный честный курс о том, как построить сайт-обзорник эко-товаров с нуля — все реальные шаги, по порядку.

nav:
  - { label: Главная, path: / }
  - { label: Обзоры, path: /reviews }
  - { label: Обучение, path: /guides }
  - { label: Roadmap, path: /roadmap }
  - { label: Контакты, path: /contact }

# Secondary links rendered in the footer (internal paths).
footerNav:
  - { label: Раскрытие о партнёрстве, path: /disclosure }
  - { label: Конфиденциальность, path: /privacy }
  - { label: Roadmap, path: /roadmap }

social:
  - { label: Pinterest, url: 'https://pinterest.com' }
  - { label: Instagram, url: 'https://instagram.com' }

contactEmail: hello@gaias-choice.example
