name: Gaia's Choice
tagline: Натуральное снаряжение для жизни в дороге с малышом
description: >-
  Честные обзоры из реального опыта — натуральные товары без пластика и отдушек
  для путешествий с малышом на кемпере, машине или с ручной кладью. Мы
  обозреваем только то снаряжение, которым владеем и пользуемся — без синтетики,
  без парфюма, без догадок.
mission: >-
  Мы помогаем семьям путешествовать осознанно, комфортно и безопасно — используя
  только натуральное, экологичное снаряжение без синтетики, отдушек и пластика.

heroImage: /images/hero.webp

values:
  - title: Честность прежде всего
    text: Каждый обзор — о снаряжении, которое мы действительно упаковали, использовали и с которым жили в дороге.
  - title: Безопасно и натурально
    text: Мы ищем органические, нетоксичные материалы — те, которым доверишь место рядом с новорождённым.
  - title: Меньше, но лучше
    text: В кемпере — да и в ручной клади — нет места для лишнего. Мы выбираем прочные, многофункциональные вещи.
  - title: Осознанность по умолчанию
    text: Меньше вещей, но лучше — это меньше отходов, более лёгкая дорога и меньший след.

