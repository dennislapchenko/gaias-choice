name: Gaia's Choice
tagline: Натуральные вещи для жизни в дороге с малышом. Рил ба.
description: >-
  Честные обзоры из реального опыта — натуральные товары без пластика и отдушек
  для путешествий с малышом на кемпере, машине или с ручной кладью. Мы
  обозреваем только то, чем сами владеем и пользуемся — без синтетики,
  без парфюма, без догадок. Если мы это не проверили руками — этого здесь нет.
bio: >-
  Два года мы своими руками строили кемпер с нуля — теперь живём в нём в дороге
  с малышом и двумя басенджи.
mission: >-
  Мы помогаем семьям путешествовать осознанно, комфортно и безопасно — используя
  только натуральные, экологичные вещи без синтетики, отдушек и пластика.
  Не потому что так модно, а потому что вещь рядом с малышом должна быть честной.

# Текущий продакшн-адрес — сейчас это подпуть GitHub Pages, позже переедет на
# корень собственного домена (см. комментарий в en/site.yaml).
url: https://dennislapchenko.github.io/gaias-choice

heroImage: /images/hero.webp

values:
  - title: Честность прежде всего
    icon: honesty
    text: Каждый обзор — о вещах, которые мы действительно упаковали, использовали и с которыми жили в дороге. Ничего из головы.
  - title: Безопасно и натурально
    icon: natural
    text: Мы ищем органические, нетоксичные материалы — те, которым доверишь место рядом с новорождённым, без «но там наверное всё в порядке».
  - title: Меньше, но лучше
    icon: less
    text: В кемпере — да и в ручной клади — нет места для лишнего. Мы выбираем прочные, многофункциональные вещи и не путаем это с экономией.
  - title: Осознанность по умолчанию
    icon: mindful
    text: Меньше вещей, но лучше — это меньше отходов, более лёгкая дорога и меньший след. Осознанность — не лозунг, а то, что реально проверяется в поездке.

# Учителя, стоящие за мировоззрением сайта, — панель «Кого мы уважаем» в левой
# колонке. Суть (идеи, оговорки) — в context/ideology-context.md; держим списки
# синхронными, порядок тот же. Имена людей и названия книг НЕ переводим
# (глоссарий do-not-translate) — во всех локалях оригинальное написание.
respected:
  - name: Paul Chek
    bio: Пионер холистического здоровья, основатель CHEK Institute.
    why: Взвешивает каждый выбор сразу на четырёх весах — сон, еда, движение, радость — и первым делом спрашивает, какой мечте служат твои ежедневные привычки.
    url: "https://chekinstitute.com"
  - name: Dave Asprey
    bio: Основатель биохакинга и Bulletproof.
    why: Сначала убери яд, потом добавляй умное — и верь измерению, а не догме, даже собственной.
    url: "https://daveasprey.com"
  - name: Daniel Reid
    bio: Автор "The Tao of Health, Sex and Longevity"; открыл Западу даосскую практику здоровья и сочетание продуктов.
    why: Пищеварение для него — ремесло, которое тело уже знает — ешь проще и суди собственным желудком.
    url: "https://www.danreid.org"
  - name: Stephen Harrod Buhner
    bio: Травник, автор "Plant Intelligence and the Imaginal Realm".
    why: Понимает Гею буквально — мир жив и разумен, а сердце — орган, которым его воспринимают.
    url: "https://www.stephenharrodbuhner.com"
  - name: Konstantin Daragan
    bio: Астролог; его строгая эфемеридная техника лежит в основе нашего альманаха.
    why: Если входишь в немейнстримную область — входи на самом серьёзном её уровне, или не входи вовсе.
    url: "https://astrology-online.ru"
  - name: Peter Ralston
    bio: Первый неазиат — чемпион мира по полноконтактным боевым искусствам (1978), основатель Cheng Hsin; автор "The Book of Not Knowing".
    why: Незнание — честная точка отсчёта — никогда не принимай концепцию за опыт.
    url: "https://chenghsin.com"
  - name: Mooji
    bio: Учитель недвойственности (Anthony Paul Moo-Young).
    why: «Будь никем и ничем — и посмотри, потеряешь ли что-то, кроме иллюзий». Корень нашего «меньше, но лучше».
    url: "https://mooji.org"
  - name: Rudolf Steiner
    bio: Австрийский философ (1861–1925), основатель вальдорфской педагогики.
    why: Среда и есть учебная программа — ребёнок впитывает весь мир вокруг, поэтому материалы и ритм никогда не мелочи.
    url: "https://rsarchive.org"
  - name: Teal Swan
    bio: Современный учитель об эмоциях и травме.
    why: Ребёнку нужно чувствовать, что его чувствуют, — настройка на ребёнка, а не управление им, и есть сердце родительства.
    url: "https://tealswan.com"

