tagline: Залезть во все кроличьи норы и остаться собой. Рил ба.
description: >-
  Честные обзоры натуральных вещей без пластика и отдушек для путешествий с
  малышом — на кемпере, машине или с ручной кладью — плюс бесплатные курсы о
  естественной жизни, которую мы сами практикуем, и рукописные заметки из
  дороги — про сами поездки и про то полезное, что мы делаем. Всё здесь сначала
  прожито: обозреваем только то, чем сами пользуемся, учим только тому, что
  проверили на себе, и рассказываем как было — семья в дороге, что ищет землю,
  где пустить корни. Если мы это не прожили — этого здесь нет.
bio: >-
  Два года мы своими руками строили кемпер с нуля — теперь живём в нём в дороге
  с малышом и двумя басенджи и ищем землю, где пустить корни: пищевой лес,
  усадьбу и сообщество, где делятся знанием.
mission: >-
  Мы помогаем семьям жить и путешествовать осознанно, комфортно и безопасно — с
  натуральными вещами без синтетики, отдушек и пластика и со знаниями, которые
  мы сначала проверяем на себе. Не потому что так модно, а потому что рядом с
  малышом всё должно быть честным — и вещь, и совет. Мы проживаем это в дороге,
  пока ищем место, где пустить корни, — усадьбу, пищевой лес, сообщество, — и
  весь сайт документирует этот поиск.

values:
  - title: Честность прежде всего
    icon: honesty
    text: Каждый обзор, курс и заметка — из того, что мы действительно упаковали, практиковали и прожили — в дороге или дома. Ничего из головы.
  - title: Безопасно и натурально
    icon: natural
    text: Мы ищем органические, нетоксичные материалы — те, которым доверишь место рядом с новорождённым, без «но там наверное всё в порядке».
  - title: Меньше, но лучше
    icon: less
    text: В кемпере — да и в ручной клади — нет места для лишнего. Мы выбираем прочные, многофункциональные вещи и не путаем это с экономией.
  - title: Осознанность по умолчанию
    icon: mindful
    text: Меньше вещей, но лучше — это меньше отходов, более лёгкая дорога и меньший след. Осознанность — не лозунг, а то, что реально проверяется в поездке.

# Gaia Score — система оценки обзоров. Вместо одной звёздной цифры каждая вещь
# получает оценку 0–5 по ОДНИМ И ТЕМ ЖЕ критериям, чтобы оценки что-то значили
# на всём сайте (и со временем — для брендов, которые мы обозреваем). Массив
# `scores:` во фронтматтере каждого товара соответствует `items` ниже, по порядку.
# ВНИМАНИЕ: названия ПРЕДВАРИТЕЛЬНЫЕ (из стратегических заметок) — владельцы ещё
# утвердят, по чему судим; переименование здесь меняет ярлыки во всех обзорах сразу.
ratingCriteria:
  title: Оценки
  items:
    - Частота использования
    - Стоило своих денег
    - Сколько души

# Учителя, стоящие за мировоззрением сайта, — панель «Кого мы уважаем» в левой
# колонке. Суть (идеи, оговорки) — в context/ideology-context.md; держим списки
# синхронными, порядок тот же. Имена людей и названия книг НЕ переводим
# (глоссарий do-not-translate) — во всех локалях оригинальное написание.
respected:
  - name: Paul Chek
    bio: Пионер холистического здоровья, основатель CHEK Institute.
    why: Взвешивает каждый выбор сразу на четырёх весах — сон, еда, движение, радость — и первым делом спрашивает, какой мечте служат твои ежедневные привычки.
    url: "https://chekinstitute.com"
  - name: Dave Asprey
    bio: Основатель биохакинга и Bulletproof.
    why: Сначала убери яд, потом добавляй умное — и верь измерению, а не догме, даже собственной.
    url: "https://daveasprey.com"
  - name: Daniel Reid
    bio: Автор "The Tao of Health, Sex and Longevity"; открыл Западу даосскую практику здоровья и сочетание продуктов.
    why: Пищеварение для него — ремесло, которое тело уже знает — ешь проще и суди собственным желудком.
    url: "https://www.danreid.org"
  - name: Stephen Harrod Buhner
    bio: Травник, автор "Plant Intelligence and the Imaginal Realm".
    why: Понимает Гаию буквально — мир жив и разумен, а сердце — орган, которым его воспринимают.
    url: "https://www.stephenharrodbuhner.com"
  - name: Konstantin Daragan
    bio: Астролог; его строгая эфемеридная техника лежит в основе нашего альманаха.
    why: Если входишь в немейнстримную область — входи на самом серьёзном её уровне, или не входи вовсе.
    url: "https://astrology-online.ru"
  - name: Peter Ralston
    bio: Первый неазиат — чемпион мира по полноконтактным боевым искусствам (1978), основатель Cheng Hsin; автор "The Book of Not Knowing".
    why: Незнание — честная точка отсчёта — никогда не принимай концепцию за опыт.
    url: "https://chenghsin.com"
  - name: Mooji
    bio: Учитель недвойственности (Anthony Paul Moo-Young).
    why: «Будь никем и ничем — и посмотри, потеряешь ли что-то, кроме иллюзий». Корень нашего «меньше, но лучше».
    url: "https://mooji.org"
  - name: Rudolf Steiner
    bio: Австрийский философ (1861–1925), основатель вальдорфской педагогики.
    why: Среда и есть учебная программа — ребёнок впитывает весь мир вокруг, поэтому материалы и ритм никогда не мелочи.
    url: "https://rsarchive.org"
  - name: Teal Swan
    bio: Современный учитель об эмоциях и травме.
    why: Ребёнку нужно чувствовать, что его чувствуют, — настройка на ребёнка, а не управление им, и есть сердце родительства.
    url: "https://tealswan.com"

# Themed Compass collections shown as thumbnails at the top of /compass. A
# chapter belongs to the epic whose `tag` equals its FIRST tag. The first epic
# here is the default selection. Add an epic + tag chapters with it to grow this.
epics:
  - tag: founder-guide
    title: Честный сайт с нуля
    image: /images/epic-founder-guide.svg
    blurb: Kурс из 5 глав — о том, как построить сайт-обзорник и блог с курсами, которому верят, — на живом примере этого самого сайта, от первого обзора до запуска. Каждый шаг настоящий, включая те, что дались тяжело.
  - tag: homeopathy
    title: Может, гомеопатия
    image: /images/epic-homeopathy.svg
    blurb: Курс из 11 глав, с честным «может» — собираем домашнюю аптечку и проверяем её внимательным наблюдением, оставляя то, что вроде бы помогает, и отпуская то, что нет. Это исследование, а не догма — и точно не замена врача.
  - tag: herbalism
    title: Травничество
    image: /images/epic-herbalism.svg
    blurb: Курс из 11 глав — вырастить зелёную полку настоев, масел и настоек и узнать десять растений так, как знают людей.
  - tag: trophology
    title: Трофология
    image: /images/epic-trophology.svg
    blurb: Курс из 5 глав — о сочетании продуктов — собрать карту на холодильник и дневник пищеварения и проверить, от каких привычек за столом вам правда легче, — судя по своему телу, а не по догме.

