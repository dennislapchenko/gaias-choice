name: Gaia's Choice
tagline: Natural gear for life on the road with a baby
description: >-
  Honest, real-world reviews of natural, plastic-free, fragrance-free products
  for traveling with a little one — by camper, car, or carry-on. We review only
  gear we own and use — no synthetics, no perfumes, no guessing.
mission: >-
  We help families travel consciously, comfortably, and safely — using only
  natural, eco-friendly gear, free of synthetics, fragrance, and plastic.

heroImage: /images/hero.webp

values:
  - title: Honesty first
    icon: honesty
    text: Every review comes from gear we actually packed, used, and lived with on the road.
  - title: Safe & natural
    icon: natural
    text: We look for organic, non-toxic materials — the stuff you'd trust next to a newborn.
  - title: Less, but better
    icon: less
    text: A camper — or a carry-on — has no room for clutter. We favor durable, multi-use picks.
  - title: Mindful by default
    icon: mindful
    text: Fewer, better things means less waste, lighter travel, and a smaller footprint.

# Left-rail widgets, in render order. Each `type` maps to a component in
# src/components/Sidebar.tsx (mission | values | almanac). Reorder, drop, or
# repeat entries here; adding a brand-new type needs a component in that file.
sidebar:
  - type: mission
  - type: values
  - type: almanac

nav:
  - { label: Home, path: / }
  - { label: Reviews, path: /reviews }
  - { label: Guides, path: /guides }
  - { label: About, path: /about }
  - { label: Roadmap, path: /roadmap }
  - { label: Contact, path: /contact }

# Secondary links rendered in the footer (internal paths).
footerNav:
  - { label: Affiliate disclosure, path: /disclosure }
  - { label: Privacy, path: /privacy }
  - { label: Roadmap, path: /roadmap }

social:
  - { label: Pinterest, url: 'https://pinterest.com' }
  - { label: Instagram, url: 'https://instagram.com' }

contactEmail: hello@gaias-choice.example
