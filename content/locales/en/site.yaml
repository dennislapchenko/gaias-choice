name: Gaia's Choice
tagline: Natural gear for life on the road with a baby
description: >-
  Honest, real-world reviews of natural, plastic-free, fragrance-free products
  for traveling with a little one — by camper, car, or carry-on. We review only
  gear we own and use — no synthetics, no perfumes, no guessing.
bio: >-
  We spent two years building our campervan from scratch — now we live on the
  road with our baby and two Basenji dogs.
mission: >-
  We help families travel consciously, comfortably, and safely — using only
  natural, eco-friendly gear, free of synthetics, fragrance, and plastic.

# Current production URL. This is a GitHub Pages project-page subpath for
# now; it'll move to the root of a custom domain later, at which point this
# should be updated (and BASE_PATH in the deploy workflow can drop to '/').
url: https://dennislapchenko.github.io/gaias-choice

heroImage: /images/hero.webp

values:
  - title: Honesty first
    icon: honesty
    text: Every review comes from gear we actually packed, used, and lived with on the road.
  - title: Safe & natural
    icon: natural
    text: We look for organic, non-toxic materials — the stuff you'd trust next to a newborn.
  - title: Less, but better
    icon: less
    text: A camper — or a carry-on — has no room for clutter. We favor durable, multi-use picks.
  - title: Mindful by default
    icon: mindful
    text: Fewer, better things means less waste, lighter travel, and a smaller footprint.

# Left-rail widgets, in render order. Each `type` maps to a collapsible panel in
# src/components/Sidebar.tsx (about | missionValues | almanac). Reorder, drop, or
# repeat entries here; adding a brand-new type needs a component in that file.
sidebar:
  - type: about
  - type: missionValues
  - type: almanac

# Themed guide collections shown as thumbnails at the top of /guides. A guide
# belongs to the epic whose `tag` equals the guide's FIRST tag. The first epic
# here is the default selection. Add an epic + tag guides with it to grow this.
epics:
  - tag: founder-guide
    title: An honest site from zero
    image: /images/guide-eco-items.webp
    blurb: A free five-chapter course on building a review site people trust — taught on the live example of this very site, from first review to launch.
  - tag: homeopathy
    title: Homeopathy at home
    image: /images/guide-natural-vs.webp
    blurb: An 11-chapter course — assemble a family remedy kit and learn to use it with honest observation, never replacing your doctor.
  - tag: herbalism
    title: The home herbalist
    image: /images/beeswax.webp
    blurb: An 11-chapter course — grow a green shelf of infusions, oils and tinctures, and learn ten plants the way you know people.

nav:
  - { label: Home, path: / }
  - { label: Reviews, path: /reviews }
  - { label: Compass, path: /guides }
  - { label: Roadmap, path: /roadmap }
  - { label: Contact, path: /contact }

# Secondary links rendered in the footer (internal paths).
footerNav:
  - { label: Affiliate disclosure, path: /disclosure }
  - { label: Privacy, path: /privacy }
  - { label: Roadmap, path: /roadmap }

social:
  - { label: Pinterest, url: 'https://pinterest.com' }
  - { label: Instagram, url: 'https://instagram.com' }

contactEmail: hello@gaias-choice.example
