name: Gaia's Choice
tagline: Natural living on the road with a baby
description: >-
  Honest reviews of natural, plastic-free, fragrance-free gear for traveling
  with a little one — by camper, car, or carry-on — plus free courses on the
  natural living we practice, and a handwritten journal from the road — trip
  notes plus the practices worth passing on. Everything here is lived first:
  we review only what we own and use, teach only what we practice, and tell it
  as it happened.
bio: >-
  We spent two years building our campervan from scratch — now we live on the
  road with our baby and two Basenji dogs.
mission: >-
  We help families live and travel consciously, comfortably, and safely — with
  natural, eco-friendly gear free of synthetics, fragrance, and plastic, and
  with knowledge we test on ourselves before we share it.

# Current production URL. This is a GitHub Pages project-page subpath for
# now; it'll move to the root of a custom domain later, at which point this
# should be updated (and BASE_PATH in the deploy workflow can drop to '/').
url: https://dennislapchenko.github.io/gaias-choice

heroImage: /images/hero.webp

values:
  - title: Honesty first
    icon: honesty
    text: Every review, course, and journal entry comes from what we actually packed, practiced, and lived — on the road or at home.
  - title: Safe & natural
    icon: natural
    text: We look for organic, non-toxic materials — the stuff you'd trust next to a newborn.
  - title: Less, but better
    icon: less
    text: A camper — or a carry-on — has no room for clutter. We favor durable, multi-use picks.
  - title: Mindful by default
    icon: mindful
    text: Fewer, better things means less waste, lighter travel, and a smaller footprint.

# The teachers behind the site's worldview, shown in the sidebar "Respected"
# panel. Their substance (ideas we carry, cautions) lives in
# context/ideology-context.md — keep the two lists in sync, same order.
respected:
  - name: Paul Chek
    bio: Holistic-health pioneer, founder of the CHEK Institute.
    why: He weighs every choice on four scales at once — rest, food, movement, joy — and asks first what dream your daily habits serve.
    url: "https://chekinstitute.com"
  - name: Dave Asprey
    bio: Founder of biohacking and Bulletproof.
    why: Remove the poison before adding the clever — and trust measurement over dogma, even your own.
    url: "https://daveasprey.com"
  - name: Daniel Reid
    bio: Author of "The Tao of Health, Sex and Longevity"; brought Taoist health practice and food combining to the West.
    why: He treats digestion as a craft the body already knows — eat simply, and let your own gut be the judge.
    url: "https://www.danreid.org"
  - name: Stephen Harrod Buhner
    bio: Herbalist, author of "Plant Intelligence and the Imaginal Realm".
    why: He takes Gaia literally — the world is alive and intelligent, and the heart is an organ for perceiving it.
    url: "https://www.stephenharrodbuhner.com"
  - name: Konstantin Daragan
    bio: Astrologer; his ephemeris-grade technique powers our almanac.
    why: If you enter a non-mainstream domain, enter it at its most rigorous — or not at all.
    url: "https://astrology-online.ru"
  - name: Peter Ralston
    bio: First non-Asian world champion of full-contact martial arts (1978), founder of Cheng Hsin; author of "The Book of Not Knowing".
    why: Not-knowing is the honest starting point — never mistake a concept for an experience.
    url: "https://chenghsin.com"
  - name: Mooji
    bio: Non-duality teacher (Anthony Paul Moo-Young).
    why: '"Be nobody and nothing — and see if you lose anything but illusions." The root of owning things without being owned.'
    url: "https://mooji.org"
  - name: Rudolf Steiner
    bio: Austrian philosopher (1861–1925), founder of Waldorf education.
    why: The environment is the curriculum — a child absorbs the whole world around them, so materials and rhythm are never details.
    url: "https://rsarchive.org"
  - name: Teal Swan
    bio: Contemporary teacher on emotion and trauma.
    why: Children need to feel felt — attunement, not management, is the heart of parenting.
    url: "https://tealswan.com"

# Left-rail widgets, in render order. Each `type` maps to a collapsible panel in
# src/components/Sidebar.tsx (about | missionValues | respected | almanac).
# Reorder, drop, or repeat entries here; adding a brand-new type needs a
# component in that file.
sidebar:
  - type: about
  - type: missionValues
  - type: respected
  - type: almanac

# Themed Compass collections shown as thumbnails at the top of /compass. A
# chapter belongs to the epic whose `tag` equals its FIRST tag. The first epic
# here is the default selection. Add an epic + tag chapters with it to grow this.
epics:
  - tag: founder-guide
    title: An honest site from zero
    image: /images/epic-founder-guide.svg
    blurb: A 5-chapter guide — on building a review site people trust — taught on the live example of this very site, from first review to launch.
  - tag: homeopathy
    title: Homeopathy
    image: /images/epic-homeopathy.svg
    blurb: A 11-chapter guide — assemble a family remedy kit and learn to use it with honest observation, never replacing your doctor.
  - tag: herbalism
    title: Herbalism
    image: /images/epic-herbalism.svg
    blurb: A 11-chapter guide — grow a green shelf of infusions, oils and tinctures, and learn ten plants the way you know people.
  - tag: trophology
    title: Trophology
    image: /images/epic-trophology.svg
    blurb: A 5-chapter guide to food combining — build a fridge chart and a digestion journal, then test which eating habits actually leave you lighter, judged by your own body, never by dogma.
  # English-only course (owner decision 2026-07-05) — deliberately absent from
  # ru/site.yaml, so the RU locale never shows this tab.
  - tag: inside-websites
    title: Inside websites Like This
    image: /images/epic-inside-websites.svg
    blurb: A 5-chapter guide for developers, designers and ops people — how a modern frontend site works under the hood, taught on this site's own code, from the URL bar down to the lockfile.

