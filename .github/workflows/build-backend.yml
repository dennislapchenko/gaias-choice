name: Build backend image

# Builds backend/Dockerfile and pushes it to GHCR, then rolls the deploy: the
# final step bumps BE_TAG in .doco-cd.yml to the built sha and pushes, so doco-cd
# on the VM reconciles the new image within ~30s. One human push → live. Tags
# each image with the commit sha (what BE_TAG pins) plus a moving `latest`. The
# GHCR package must be public for the VM to pull unauthenticated — set once after
# the first push (Package settings → Change visibility).
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/build-backend.yml"
  workflow_dispatch:

permissions:
  contents: write # the roll step commits the BE_TAG bump to main
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dennislapchenko/gaias-choice-be
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Roll the deploy: point BE_TAG at the image we just built and push to
      # main. doco-cd reconciles it on its next poll. Applied on latest main (not
      # the detached build sha) so it fast-forwards cleanly; [skip ci] keeps this
      # tag-only commit from re-running any workflow (the paths filter already
      # blocks a build loop — this also suppresses a redundant Pages rebuild).
      - name: Roll BE_TAG for doco-cd
        run: |
          set -euo pipefail
          tag="sha-${GITHUB_SHA}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --quiet origin main
          git checkout -B main origin/main
          sed -E -i "s|^(  BE_TAG: ).*|\1${tag}|" .doco-cd.yml
          grep -q "^  BE_TAG: ${tag}\$" .doco-cd.yml
          if git diff --quiet -- .doco-cd.yml; then
            echo "BE_TAG already ${tag} — nothing to roll"; exit 0
          fi
          git add .doco-cd.yml
          git commit -m "chore(deploy): roll VM backend image to ${tag} [skip ci]"
          git push origin main
