name: Deploy to Pages

on:
  push:
    branches:
      - main
  # Lets you manually trigger a clean redeploy from the Actions tab. Prefer
  # this over "re-run failed jobs" on a stuck run — re-running re-uploads the
  # `github-pages` artifact into the SAME run without clearing the old one,
  # and actions/deploy-pages then errors with "Multiple artifacts named
  # github-pages were unexpectedly found" (seen 2026-07-05). A fresh run via
  # workflow_dispatch (or a new push) always starts with a clean artifact slate.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# A newer push supersedes an in-flight run: cancel it so rapid content edits
# don't stack N sequential builds (each ~2 min). Safe here because every deploy
# publishes the FULL current build — a cancelled/failed run is fully recovered
# by the next one; there's no partial-state to worry about.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # The SPA lives in frontend/; content/ stays at repo root (globbed via
    # ../../../content at build time). npm steps run inside frontend/.
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.11.0
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          # Project page lives under /gaias-choice/. vite.config.ts reads this;
          # local/Cloud Run builds leave it unset and serve from "/".
          BASE_PATH: /gaias-choice/
          # Point the SPA at the backend on the VM (Caddy-terminated TLS). Not a
          # secret — just the public API base. api.ts falls back to same-origin
          # /api when unset; remove this line to unwire the live site from the BE.
          VITE_API_URL: https://gaias-choice.gardenofatlantis.com/api
      - name: SPA fallback
        # GitHub Pages has no server-side rewrite, so deep links (e.g.
        # /gaias-choice/reviews/foo) hit 404.html. Serving a copy of index.html
        # there lets the client router take over.
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          # `with:` ignores defaults.run.working-directory — needs the full path.
          path: frontend/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
