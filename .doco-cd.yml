# doco-cd deploy config for the live backend stack (api + caddy). The VM's
# doco-cd polls this repo and reconciles deploy/ on push to main.
#
# Split by sensitivity:
#   - Non-secrets (below) live in git — a public DNS name, a public origin, and
#     the deployed image tag (a public GHCR sha). Bumping BE_TAG here IS the
#     backend release: commit + push, doco-cd redeploys the api. No VM edit.
#   - Secrets are NOT here. They live on the VM in /opt/doco-cd/secrets.env,
#     loaded into the doco-cd container and forwarded into this stack's compose
#     interpolation via PASS_ENV=true on the daemon (${GITHUB_TOKEN}, the
#     BOOTSTRAP_ADMIN_*, POSTMARK/TELEGRAM/ANTHROPIC tokens, …). Phase 3
#     (optional) swaps that for a SOPS+age-encrypted env file committed here.
name: gaias-choice
working_dir: deploy/app
environment:
  API_DOMAIN: gaias-choice.gardenofatlantis.com
  CORS_ORIGINS: https://dennislapchenko.github.io
  BE_TAG: sha-4458a8dd8281688e16083c967b6dcd50b54d3ce1
# Runtime self-healing (doco-cd watches Docker events on this stack's containers):
#   unhealthy → in-place container restart (api's /api/healthz DB probe drives it)
#   die       → full `compose up` reconcile + a [R] Telegram alert on any
#               unexpected exit. Events during our own deploys are suppressed
#               (isStackDeploymentInProgress), so a BE_TAG bump won't self-fire.
# Both send a [R] notification. Exit code isn't in the payload — check `task be:logs`.
reconciliation:
  events: [unhealthy, die]
