# Local dev stack: FE (Vite HMR) + BE (air hot reload), one `task dev`.
# Both toolchains stay containerized; deps live in the existing named volumes
# so `task deps` caching still applies. Ctrl-C tears both down.
services:
  web:
    image: node:22-alpine
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      # The browser (not this container) calls the API, so localhost is correct.
      VITE_API_URL: http://localhost:8787/api
    ports:
      - "5173:5173"

  api:
    image: golang:1.25-alpine
    working_dir: /app/backend
    # air rebuilds+restarts on save. Pinned exact version; run-not-imported, so
    # it never enters go.mod. GOFLAGS -buildvcs=false: workdir isn't the git root.
    command: go run github.com/air-verse/air@v1.65.3
    volumes:
      - .:/app
      - go_cache:/go
    environment:
      GOFLAGS: -buildvcs=false
      # Live-edit seam, SANDBOXED to the working tree. LOCAL_CONTENT_DIR routes
      # the content API to the local filesystem instead of the GitHub proxy, so
      # portal saves write content/ files in the mounted repo (Vite HMR reflects
      # them) — no commit, no deploy, no GITHUB_TOKEN. The repo is mounted at /app.
      LOCAL_CONTENT_DIR: /app
      # First-boot admin for the local DB (backend/data, git-ignored) so #edit
      # login works with zero setup. Created only while the users table is
      # empty — nuke backend/data to re-bootstrap. Override via the root .env.
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-dev@local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-dev-password}
      # Magic-link email in dev: "log" mode prints the email (link included)
      # to this container's stdout — no SMTP credentials (prod uses Postmark;
      # see deploy/README.md). Copy the link into the browser to sign in.
      SMTP_HOST: log
      PUBLIC_SITE_URL: http://localhost:5173
    ports:
      - "8787:8787"
    links:
      - web

volumes:
  # Declared external so they are the same volumes `task deps` / the Go cache use.
  node_modules:
    external: true
    name: gaias-choice-node-modules
  go_cache:
    external: true
    name: gaias-choice-go-cache
