# Throwaway stack that proves the doco-cd GitOps loop end-to-end WITHOUT touching
# the live api/caddy stack. doco-cd reconciles it via .doco-cd.test.yml (poll
# `target: test`). No ports, no volumes — nothing reachable, nothing to clean up
# but one container. Bump WHOAMI_NAME in .doco-cd.test.yml and push to watch
# doco-cd recreate it. Delete this dir + .doco-cd.test.yml once the loop is proven.
services:
  whoami:
    image: traefik/whoami:latest
    restart: unless-stopped
    command: ["--name", "${WHOAMI_NAME:-unset}"]
