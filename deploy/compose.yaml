# Production stack for the VM (reconciled by doco-cd). Dormant until the VM
# exists; the files are valid now. Only Caddy publishes ports; the api service
# stays internal to the compose network. See deploy/README.md for activation.
services:
  api:
    image: ghcr.io/dennislapchenko/gaias-choice-be:${BE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Live-editing seam: without GITHUB_TOKEN, /api/content/* answers 503
      # (CLAUDE.md "Backend"). Editing itself is gated by login — the first
      # admin is created from BOOTSTRAP_ADMIN_* on the first boot with an empty
      # users table (a no-op every boot after). Values come from deploy.env on
      # the VM, never committed. The `:-` keeps compose config renderable when
      # they're absent.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    volumes:
      - /srv/gaias-choice/data:/data # host bind mount, per D9 (boring backups)

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN} # api.<owner's owned domain>
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/gaias-choice/caddy:/data # cert storage survives redeploys
