# Production stack for the VM (reconciled by doco-cd). Dormant until the VM
# exists; the files are valid now. Only Caddy publishes ports; the api service
# stays internal to the compose network. See deploy/README.md for activation.
services:
  api:
    image: ghcr.io/dennislapchenko/gaias-choice-be:${BE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Live-editing seam: without GITHUB_TOKEN, /api/content/* answers 503
      # (CLAUDE.md "Backend"). Editing itself is gated by login — the first
      # admin is created from BOOTSTRAP_ADMIN_* on the first boot with an empty
      # users table (a no-op every boot after). Values come from deploy.env on
      # the VM, never committed. The `:-` keeps compose config renderable when
      # they're absent.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      # Magic-link sign-in email. Live transport: Postmark's HTTP API
      # (POSTMARK_TOKEN + POSTMARK_STREAM). The SMTP_* block stays as the
      # provider-neutral fallback (unused while a token is set). Neither
      # configured ⇒ /api/auth/magic answers 503 (the dialog reports links
      # unavailable). Values live in deploy.env on the VM.
      POSTMARK_TOKEN: ${POSTMARK_TOKEN:-}
      POSTMARK_STREAM: ${POSTMARK_STREAM:-outbound}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-}
      # Telegram sign-in (the primary login). BotFather token; unset ⇒
      # /api/auth/telegram* answer 503 and the dialog falls back to email.
      # Value lives in deploy.env on the VM, never committed.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Draft-template enrichment (internal/enrich). Anthropic API key; unset ⇒
      # POST /api/content/template answers 503 and the draft composer keeps the
      # static template. ANTHROPIC_MODEL optionally overrides the default.
      # Value lives in deploy.env on the VM (swept from the root .env), never committed.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
    volumes:
      - /srv/gaias-choice/data:/data # host bind mount, per D9 (boring backups)
    # Readiness gate for doco-cd reconciliation (.doco-cd.yml `reconciliation`).
    # The binary probes /api/healthz (DB round-trip) — distroless has no curl.
    # unhealthy ⇒ doco-cd restarts the container; start_period covers boot+migrate.
    healthcheck:
      test: ["CMD", "/server", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # Caddyfile edits auto-apply: doco-cd tracks the files each service references
    # (incl. this bind-mounted Caddyfile) and force-recreates caddy when its
    # content changes — no --watch needed (see deploy/infra-log.md "reconcile
    # triggers"). Default image CMD runs caddy; do not override without the
    # `caddy` binary prefix (the image has no entrypoint).
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN} # api.<owner's owned domain>
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/gaias-choice/caddy:/data # cert storage survives redeploys
