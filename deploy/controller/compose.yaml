# doco-cd daemon — the GitOps controller for this VM. Server bootstrap, lives on
# the VM (not the repo). Polls this repo and runs `docker compose up` on change.
# No published ports: polling doesn't need inbound reachability, so the edge
# firewall stays 22/80/443 only. Public repo → no GIT_ACCESS_TOKEN. Images pinned
# to digests (immutable); bump tag+digest together to upgrade.
services:
  doco-cd:
    image: ghcr.io/kimdre/doco-cd:v0.94.0@sha256:378fd7d5fcbd9b038640dd14af7ded1686ab26b464bbbe7df880cc0563161e38
    restart: unless-stopped
    # secrets.env holds the live stack's env (the former deploy.env). PASS_ENV
    # forwards these into every deployment's compose interpolation, so
    # ${API_DOMAIN}, ${BE_TAG}, ${GITHUB_TOKEN}, … in deploy/compose.yaml resolve
    # here — secrets stay on the VM, never in the repo. chmod 600, uncommitted.
    env_file:
      - secrets.env
    environment:
      LOG_LEVEL: warn
      TZ: Europe/Helsinki
      POLL_CONFIG_FILE: /etc/doco-cd/poll.yaml
      PASS_ENV: "true"
      # Deploy notifications → Telegram via the Apprise sidecar below. `success`
      # is a MINIMUM level, and a no-op poll isn't a deployment — so this fires on
      # ✅ completed / ❌ failed deploys + reconciliation warnings only, never
      # per-poll. APPRISE_NOTIFY_URLS carries the bot token, so it lives in
      # secrets.env (not here): tgram://<TELEGRAM_BOT_TOKEN>/<chat_id>/
      APPRISE_API_URL: http://apprise:8000/notify
      APPRISE_NOTIFY_LEVEL: success
    depends_on:
      - apprise
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./poll.yaml:/etc/doco-cd/poll.yaml:ro
      - data:/data
    healthcheck:
      test: ["CMD", "/doco-cd", "healthcheck"]
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3

  # Apprise API server — doco-cd's only notification transport (its notifier
  # speaks the Apprise wire format, not a raw templatable webhook). Stateless,
  # internal-only (no published port; reached at apprise:8000 on the compose
  # network), so the edge firewall is untouched. It turns doco-cd's Apprise POST
  # into the Telegram sendMessage call. depends_on is service_started (not
  # _healthy) on purpose: a broken apprise must never block the daemon from
  # polling — a missed early ping is logged, deploys still happen.
  apprise:
    image: caronc/apprise@sha256:91321755496e8472bdb674e4b14eb64d1f3b15510ef94971309c9f76ef3171e7
    restart: unless-stopped
    environment:
      TZ: Europe/Helsinki
      APPRISE_WORKER_COUNT: 1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  data:
